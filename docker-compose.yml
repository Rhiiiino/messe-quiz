version: '3.8'

services:
  quiz-app:
    build: .
    container_name: hpvg-quiz
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-change-me-please}
      - SESSION_SECRET=${SESSION_SECRET:-please-set-a-secret}
    volumes:
      - ./leads.db:/app/leads.db
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
